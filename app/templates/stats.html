{% extends "base.html" %}

{% block content %}

<!-- ========================= -->
<!-- PERFORMANCE CENTER HEADER -->
<!-- ========================= -->
<div class="performance-center-box">
    <h1 class="page-title">Performance Center</h1>

    <div class="stats-filter-bar">
        <div class="filter-group">
            <label for="statsMonth">Month</label>
            <select id="statsMonth">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4" selected>April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="statsYear">Year</label>
            <select id="statsYear">
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
            </select>
        </div>
    </div>

    <!-- ========================= -->
    <!-- MONTHLY OVERVIEW (NEW)    -->
    <!-- ========================= -->
    <div id="monthlyOverview" class="monthly-overview-box"></div>
</div>

<!-- ========================= -->
<!-- SUMMARY TILES             -->
<!-- ========================= -->
<div id="statsSummary" class="stats-summary-grid"></div>

<!-- ========================= -->
<!-- GROUP SUMMARY TILES       -->
<!-- ========================= -->
<div id="groupSummary" class="stats-summary-grid"></div>

<!-- ========================= -->
<!-- PLAYER PERFORMANCE TILES  -->
<!-- ========================= -->
<h2 class="section-title">Player Performance</h2>

<div id="playerStatsContainer" class="player-stats-grid">
    <!-- JS will inject tiles -->
</div>

<!-- ========================= -->
<!-- COMPLETED ACCAS SECTION   -->
<!-- ========================= -->
<h2 class="section-title">Completed Accumulators</h2>

<div id="accaHistoryContainer"></div>

<!-- ========================= -->
<!-- JS LOADER                 -->
<!-- ========================= -->
<script src="/static/app_v10001.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const monthSelect = document.getElementById("statsMonth");
    const yearSelect = document.getElementById("statsYear");

    async function refreshStats() {
        loadMonthlyOverview();   // NEW
        loadGroupSummary();
        loadPlayerStats();
        loadStatsPageHistory();
    }

    monthSelect.addEventListener("change", refreshStats);
    yearSelect.addEventListener("change", refreshStats);

    refreshStats();
});
</script>

{% endblock %}
