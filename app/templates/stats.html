<!DOCTYPE html>
<html>
<head>
    <title>Stats</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <a href="/home">Home</a>
    <a href="/add-pick">Add Pick</a>
    <a href="/current-picks">Current Picks</a>
    <a href="/stats">Stats</a>
    <a href="/player-details">Player Details</a>
    <a href="/raceday">Race Day</a>
</nav>

<h1>Monthly Stats</h1>

<div class="form-card">
    <form id="statsForm">
        <label>Month</label>
        <input name="month" type="number" min="1" max="12" required>

        <label>Year</label>
        <input name="year" type="number" required>

        <button type="submit" class="submit-btn">Load Stats</button>
    </form>
</div>

<div id="statsSummary" class="stats-summary"></div>

<table id="statsTable" class="stats-table" style="display:none;">
    <thead>
        <tr>
            <th>Player</th>
            <th>Wins</th>
            <th>Places</th>
            <th>Loses</th>
            <th>NR</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="/static/app.js"></script>
<script>
    setupStatsForm();
</script>

</body>
</html>
