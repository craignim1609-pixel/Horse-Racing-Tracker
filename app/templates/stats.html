{% extends "base.html" %}
{% block content %}

<h1>Player Statistics</h1>

<div class="section-title">Group Performance Overview</div>

<!-- PLAYER CARDS -->
<div id="stats-cards" class="stats-cards-container">
    <!-- JS will populate stats cards here -->
    <div class="empty-message">Loading player stats...</div>
</div>

<!-- STATS MODAL -->
<div id="statsModal" class="modal hidden">
    <div class="modal-content">

        <span class="modal-close" id="closeStatsModal">&times;</span>

        <h2 class="modal-title" id="modalPlayerName">Player Stats</h2>

        <!-- TOP STATS GRID -->
        <div class="modal-stats">
            <div class="stat-box win-box">
                <label>Wins</label>
                <span id="modalWins">0</span>
            </div>

            <div class="stat-box place-box">
                <label>Places</label>
                <span id="modalPlaces">0</span>
            </div>

            <div class="stat-box lose-box">
                <label>Loses</label>
                <span id="modalLoses">0</span>
            </div>

            <div class="stat-box nr-box">
                <label>Non-Runners</label>
                <span id="modalNR">0</span>
            </div>

            <div class="stat-box">
                <label>Total Bets</label>
                <span id="modalTotal">0</span>
            </div>

            <div class="stat-box">
                <label>Win %</label>
                <span id="modalWinRate">0%</span>
            </div>
        </div>

        <!-- COURSE TABLE -->
        <h3 class="section-title">Course Performance</h3>

        <table class="modal-table">
            <thead>
                <tr>
                    <th>Course</th>
                    <th class="center">Runs</th>
                    <th class="center">Wins</th>
                    <th class="center">Places</th>
                </tr>
            </thead>
            <tbody id="modalCourseTable">
                <!-- JS will populate -->
            </tbody>
        </table>

        <!-- PROFIT BAR CHART -->
        <h3 class="section-title">Profit Breakdown</h3>

        <div id="modalProfitChart" class="bar-chart">
            <!-- JS will populate -->
        </div>

    </div>
</div>

<script src="/static/app_v10001.js"></script>
<script>
    loadStatsPage();
</script>

{% endblock %}
