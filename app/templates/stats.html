<h1>Monthly Stats</h1>

<div class="form-card">
    <form id="statsForm">
        <label>Month</label>
        <input name="month" type="number" min="1" max="12" required>

        <label>Year</label>
        <input name="year" type="number" required>

        <button type="submit" class="submit-btn">Load Stats</button>
    </form>
</div>

<div id="statsSummary" class="stats-summary"></div>

<h1 class="stats-title">Performance Center</h1>

<div class="stats-grid" id="statsGrid">
    <!-- JS will fill this -->
</div>
