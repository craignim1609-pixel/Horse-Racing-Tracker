<html>
<head>
    <title>Stats</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <a href="/home">Home</a>
    <a href="/add-pick">Add Pick</a>
    <a href="/current-picks">Current Picks</a>
    <a href="/stats" class="active">Stats</a>
    <a href="/player-details">Player Details</a>
    <a href="/raceday">Race Day</a>
</nav>

<h1>Performance Center</h1>

<div class="race-container">

    <!-- LEFT PANEL: Month Selector -->
    <div class="left-panel">
        <h2>Filter</h2>

        <div class="player-profile">
            <label>Select Month</label>
            <select id="monthSelect" class="form-select">
                <option value="">All Time</option>
                <option>January</option>
                <option>February</option>
                <option>March</option>
                <option>April</option>
                <option>May</option>
                <option>June</option>
                <option>July</option>
                <option>August</option>
                <option>September</option>
                <option>October</option>
                <option>November</option>
                <option>December</option>
            </select>
        </div>
    </div>

    <!-- RIGHT PANEL: Player Cards -->
    <div class="right-panel">
        <h2>Player Stats</h2>
        <div id="statsGrid" class="race-list"></div>
    </div>

</div>

<!-- MODAL -->
<div id="playerModal" class="modal hidden">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">×</span>

        <h2 id="modalPlayerName" class="modal-title"></h2>

        <div class="modal-stats">
            <div class="stat-box win-box">
                <label>Wins</label>
                <span id="modalWins"></span>
            </div>
            <div class="stat-box place-box">
                <label>Places</label>
                <span id="modalPlaces"></span>
            </div>
            <div class="stat-box lose-box">
                <label>Losses</label>
                <span id="modalLosses"></span>
            </div>
            <div class="stat-box nr-box">
                <label>NR</label>
                <span id="modalNR"></span>
            </div>
        </div>

        <h3>Course Breakdown</h3>
        <table class="modal-table">
            <thead>
                <tr>
                    <th>Course</th>
                    <th>Bets</th>
                    <th>Horses</th>
                </tr>
            </thead>
            <tbody id="modalCourseTable"></tbody>
        </table>
    </div>
</div>

<script src="/static/app.js?v=9999"></script>

<script>
const PLAYERS = ["Craig", "Donald", "Miller", "Nick", "Josh"];

/* ---------------------------
   LOAD MONTHLY STATS
---------------------------- */
async function loadMonthlyStats() {
    const month = document.getElementById("monthSelect").value;
    const res = await fetch(`${API}/stats/month?month=${month}`);
    const data = await res.json();

    const grid = document.getElementById("statsGrid");
    grid.innerHTML = "";

    PLAYERS.forEach(player => {
        const stats = data[player] || { wins: 0, places: 0, losses: 0, nrs: 0 };

        const card = document.createElement("div");
        card.className = "race-card stats-card";
        card.onclick = () => openPlayerModal(player);

        card.innerHTML = `
            <div class="stats-card-header">
                <span class="player-name">${player}</span>
                <span class="trophy-icon ${stats.wins > 0 ? 'gold' : 'grey'}">🏆</span>
            </div>

            <div class="stats-card-body">
                <div class="stat-line">
                    <label>Wins</label>
                    <span>${stats.wins}</span>
                </div>
                <div class="stat-line">
                    <label>Places</label>
                    <span>${stats.places}</span>
                </div>
                <div class="stat-line">
                    <label>Losses</label>
                    <span>${stats.losses}</span>
                </div>
                <div class="stat-line">
                    <label>NR</label>
                    <span>${stats.nrs}</span>
                </div>
            </div>
        `;

        grid.appendChild(card);
    });
}

/* ---------------------------
   PLAYER MODAL
---------------------------- */
async function openPlayerModal(player) {
    const res = await fetch(`${API}/stats/player/${player}`);
    const data = await res.json();

    document.getElementById("modalPlayerName").textContent = player;
    document.getElementById("modalWins").textContent = data.wins;
    document.getElementById("modalPlaces").textContent = data.places;
    document.getElementById("modalLosses").textContent = data.losses;
    document.getElementById("modalNR").textContent = data.nrs;

    const table = document.getElementById("modalCourseTable");
    table.innerHTML = "";

    Object.entries(data.course_stats).forEach(([course, stats]) => {
        const row = document.createElement("tr");

        const horses = stats.horses
            .map(h => `${h.number ? '(' + h.number + ') ' : ''}${h.name}`)
            .join(", ");

        row.innerHTML = `
            <td>${course}</td>
            <td class="center">${stats.count}</td>
            <td>${horses}</td>
        `;

        table.appendChild(row);
    });

    document.getElementById("playerModal").classList.remove("hidden");
}

function closeModal() {
    document.getElementById("playerModal").classList.add("hidden");
}

/* ---------------------------
   INIT
---------------------------- */
document.addEventListener("DOMContentLoaded", () => {
    loadMonthlyStats();
    document.getElementById("monthSelect").addEventListener("change", loadMonthlyStats);
});
</script>

</body>
</html>
