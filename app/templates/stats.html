{% extends "base.html" %}

{% block content %}

<!-- ========================= -->
<!-- PERFORMANCE CENTER HEADER -->
<!-- ========================= -->
<div class="performance-center-box">
    <h1 class="page-title">Performance Center</h1>

    <!-- EXPORT BUTTON -->
    <button id="exportStatsBtn" class="export-btn">Export Stats</button>

    <div class="stats-filter-bar">
        <div class="filter-group">
            <label for="statsMonth">Month</label>
            <select id="statsMonth">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4" selected>April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="statsYear">Year</label>
            <select id="statsYear">
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
            </select>
        </div>
    </div>

    <!-- ========================= -->
    <!-- MONTHLY OVERVIEW          -->
    <!-- ========================= -->
    <div id="monthlyOverview" class="monthly-overview-box"></div>
</div>


<!-- ========================= -->
<!-- PLAYER PERFORMANCE (ACCA) -->
<!-- ========================= -->
<h2 class="section-title">Player Performance</h2>

<div id="playerStatsContainer" class="player-stats-grid">
    <!-- JS will inject tiles -->
</div>


<!-- ========================= -->
<!-- COMPLETED ACCAS SECTION   -->
<!-- ========================= -->
<h2 class="section-title">Completed Accumulators</h2>

<div id="accaHistoryContainer"></div>


<!-- ========================= -->
<!-- TODAY'S RACE DAY SUMMARY -->
<!-- ========================= -->
<h2 class="section-title">Today's Race Day Summary</h2>

<div id="raceDaySummary" class="race-summary-grid">
    <div class="summary-tile">
        <div class="label">Stake</div>
        <div class="value" id="rsStake">£0.00</div>
    </div>

    <div class="summary-tile">
        <div class="label">Return</div>
        <div class="value" id="rsReturn">£0.00</div>
    </div>

    <div class="summary-tile">
        <div class="label">Profit</div>
        <div class="value" id="rsProfit">£0.00</div>
    </div>

    <div class="summary-tile">
        <div class="label">Top Player</div>
        <div class="value" id="rsTopPlayer">—</div>
    </div>
</div>


<!-- ========================= -->
<!-- RACE DAY PLAYER PERFORMANCE -->
<!-- ========================= -->
<h2 class="section-title">Race Day Player Performance</h2>

<div id="raceDayPlayerStatsContainer" class="player-stats-grid">
    <!-- JS injects tiles -->
</div>


<!-- ========================= -->
<!-- COMPLETED RACE DAYS       -->
<!-- ========================= -->
<h2 class="section-title">Completed Race Days</h2>

<div id="completedRaceDays"></div>


<!-- ========================= -->
<!-- JS LOADER                 -->
<!-- ========================= -->
<script src="/static/app_v10001.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    async function loadFullStatsPage() {
        await loadMonthlyOverview();
        await loadPlayerStats();
        await loadStatsPageHistory();

        await loadRaceDaySummary();
        await loadRaceDayPlayerStats();
        await loadCompletedRaceDays();
    }

    const monthSelect = document.getElementById("statsMonth");
    const yearSelect = document.getElementById("statsYear");

    monthSelect.addEventListener("change", loadFullStatsPage);
    yearSelect.addEventListener("change", loadFullStatsPage);

    loadFullStatsPage();

    // ============================
    // EXPORT BUTTON HANDLER
    // ============================
    document.getElementById("exportStatsBtn").addEventListener("click", async () => {
        const response = await fetch("/stats/export");
        const blob = await response.blob();

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "stats_export.csv";
        a.click();
        window.URL.revokeObjectURL(url);
    });

});
</script>

{% endblock %}
