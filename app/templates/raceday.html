<html>
<head>
    <title>Race Day</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    
<div class="filter-bar">
    <button class="filter-btn active" onclick="filterToday()">Today Only</button>
    <button class="filter-btn" onclick="filterAll()">All Bets</button>
</div>
    
<nav class="navbar">
    <a href="/home">Home</a>
    <a href="/add-pick">Add Pick</a>
    <a href="/current-picks">Current Picks</a>
    <a href="/stats">Stats</a>
    <a href="/player-details">Player Details</a>
    <a href="/raceday" class="active">Race Day</a>
</nav>

<div class="race-header">
    <div class="race-header-left">
        <h1>Elite Racing Group</h1>
        <div class="player-badges">
            <span class="badge badge-gold">Miller</span>
            <span class="badge badge-green">Monthly Leader</span>
            <span class="badge badge-blue">Yearly Leader</span>
        </div>
    </div>

    <div class="race-header-right">
        <div class="header-stat">
            <label>Shared Acca Odds</label>
            <span class="stat-value">3.50/1</span>
        </div>

        <div class="header-stat">
            <label>£2.50 E/W Returns</label>
            <span class="stat-value">£12.81</span>
        </div>

        <div class="header-status status-won">Won</div>
    </div>
</div>

<h1>Race Day</h1>

<div class="race-container">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h2>Group Stats</h2>
        <div id="raceStats" class="player-profile"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <h2>Race Day Tracker</h2>

        <form id="raceForm" class="race-form">

            <div class="form-row">
                <label for="playerSelect">Player</label>
                <select id="playerSelect" name="player_id" required></select>
            </div>

            <div class="form-row">
                <label for="courseSelect">Course</label>
                <input id="courseSelect" name="course" type="text" placeholder="e.g. Ascot" required>
            </div>

            <div class="horse-group">
                <div>
                    <label for="horseNumber">#</label>
                    <input id="horseNumber" name="horse_number" placeholder="3" required>
                </div>
                <div>
                    <label for="horseName">Horse Name</label>
                    <input id="horseName" name="horse_name" placeholder="e.g. Frankel" required>
                </div>
            </div>

            <div class="form-row">
                <label for="raceTime">Race Time</label>
                <input id="raceTime" name="race_time" type="time" required>
            </div>

            <div class="form-row" style="display:flex; gap:12px; align-items:flex-end;">

            <div style="flex:1;">
                <label for="stake">Stake (£)</label>
                <input id="stake" name="amount_bet" type="number" step="0.01" placeholder="10.00" required>
            </div>

            <div style="display:flex; flex-direction:column; align-items:center;">
                <label style="font-size:0.75rem; opacity:0.7;">E/W</label>
                <input type="checkbox" id="eachWay" name="each_way" style="transform:scale(1.3);">
            </div>

</div>

            <div class="form-row">
                <label for="stake">Stake (£)</label>
                <input id="stake" name="amount_bet" type="number" step="0.01" placeholder="10.00" required>
            </div>

            <button type="submit" class="submit-btn">
                Submit Bet Details
            </button>

        </form>

        <div id="raceResult" class="result-box"></div>

        <h2>Recent Activity</h2>
        <div id="recentActivity" class="activity-list">
            No race day bets recorded yet.
        </div>

    </div> <!-- END RIGHT PANEL -->

</div> <!-- END RACE CONTAINER -->


<!-- RACE DAY LIST (Screenshot‑Style Cards) -->
<h2>Today's Bets</h2>
<div id="raceList"></div>

<script src="/static/app.js?v=9999"></script>

<script>
    setupRaceForm();
    loadRaceStats();
</script>

</body>
</html>
