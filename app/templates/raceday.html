<html>
<head>
    <title>Race Day</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <a href="/home">Home</a>
    <a href="/add-pick">Add Pick</a>
    <a href="/current-picks">Current Picks</a>
    <a href="/stats">Stats</a>
    <a href="/player-details">Player Details</a>
    <a href="/raceday">Race Day</a>
</nav>

<h1>Race Day</h1>

<div class="race-container">

    <div class="left-panel">
        <h2>Group Balance</h2>
        <div id="groupBalance" class="balance-card">
            <!-- JS fills this -->
        </div>
    </div>

    <div class="right-panel">
        <h2>Race Day Tracker</h2>

<form id="raceForm" class="race-form">

    <!-- Row 1 -->
    <div>
        <label>Player</label>
        <select id="playerSelect" name="player_id"></select>
    </div>

    <div>
        <label>Course</label>
        <input id="courseSelect" name="course" type="text" placeholder="Course name">
    </div>

    <div class="horse-group">
        <div>
            <label>#</label>
            <input id="horseNumber" name="horse_number">
        </div>
        <div>
            <label>Horse Name</label>
            <input id="horseName" name="horse_name">
        </div>
    </div>

    <!-- Row 2 -->
    <div>
        <label>Race Time</label>
        <input id="raceTime" name="race_time">
    </div>

    <div>
        <label>Odds</label>
        <input id="odds" name="odds_fraction">
    </div>

    <div>
        <label>Stake (£)</label>
        <input id="stake" name="amount_bet">
    </div>

    <!-- Button full width -->
    <button type="submit" class="submit-btn span-3">
        Submit Bet Details
    </button>

</form>

<div id="raceResult" class="result-box"></div>


<h2>Recent Activity</h2>
<div id="recentActivity" class="activity-list">
    No race day bets recorded yet.
</div>
    
<label style="display:flex;align-items:center;gap:6px;margin:10px 0;">
    <input type="checkbox" id="todayOnly">
    Show Today Only
</label>

<h2>Today's Bets</h2>
<div id="raceList" class="picks-grid"></div>

<h2>Group Stats</h2>
<div id="raceStats" class="player-profile"></div>

<script src="/static/app.js?v=1"></script>

<script>
    setupRaceForm();
    loadRaceStats();
</script>
    <script>
document.getElementById("todayOnly").addEventListener("change", loadRaceStats);
</script>


</body>
</html>
