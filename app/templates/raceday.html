<!DOCTYPE html>
<html>
<head>
    <title>Race Day</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <a href="/home">Home</a>
    <a href="/add-pick">Add Pick</a>
    <a href="/current-picks">Current Picks</a>
    <a href="/stats">Stats</a>
    <a href="/player-details">Player Details</a>
    <a href="/raceday">Race Day</a>
</nav>

<h1>Race Day</h1>

<div class="race-container">

    <div class="left-panel">
        <h2>Group Balance</h2>
        <div id="groupBalance" class="balance-card">
            <!-- JS fills this -->
        </div>
    </div>

    <div class="right-panel">
        <h2>Race Day Tracker</h2>

        <form id="raceForm" class="race-form">
            <label>Player</label>
            <select id="playerSelect"></select>

            <label>Course</label>
            <select id="courseSelect"></select>

            <label>Horse Name & No.</label>
            <input id="horseName" placeholder="# Frankel">

            <label>Race Time</label>
            <input id="raceTime" type="time">

            <label>Odds</label>
            <input id="odds" placeholder="4/1">

            <label>Stake (£)</label>
            <input id="stake" type="number" step="0.01">

            <button type="button" id="submitRace" class="submit-btn">
                Submit Bet Details
            </button>
        </form>
    </div>

</div>

<h2>Recent Activity</h2>
<div id="recentActivity" class="activity-list">
    No race day bets recorded yet.
</div>
    
<label style="display:flex;align-items:center;gap:6px;margin:10px 0;">
    <input type="checkbox" id="todayOnly">
    Show Today Only
</label>

<h2>Today's Bets</h2>
<div id="raceList" class="picks-grid"></div>

<h2>Group Stats</h2>
<div id="raceStats" class="player-profile"></div>

<script src="/static/app.js"></script>
<script>
    setupRaceForm();
    loadRaceStats();
</script>
    <script>
document.getElementById("todayOnly").addEventListener("change", loadRaceStats);
</script>


</body>
</html>
