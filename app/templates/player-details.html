<div class="acca-card" data-pick-id="{{ pick.id }}">

    <!-- HEADER: PLAYER + DELETE -->
    <div class="acca-card-header">
        <div class="acca-player">{{ pick.player }}</div>
        <button class="acca-delete-btn" onclick="deletePick('{{ pick.id }}')">×</button>
    </div>

    <!-- HORSE LINE -->
    <div class="acca-horse-line">
        <span class="acca-horse-number">{{ pick.horse_number }}</span>
        <span class="acca-horse-name">{{ pick.horse_name }}</span>
        <span class="acca-horse-odds">{{ pick.odds }}</span>
    </div>

    <!-- META -->
    <div class="acca-meta">
        {{ pick.course }} — {{ pick.race_time }}
    </div>

    <!-- STATUS BUTTONS -->
    <div class="acca-status-buttons">
        <button 
            class="acca-status-btn {% if pick.status == 'win' %}active{% endif %}" 
            onclick="updatePickStatus('{{ pick.id }}', 'win')">
            Win
        </button>

        <button 
            class="acca-status-btn {% if pick.status == 'place' %}active{% endif %}" 
            onclick="updatePickStatus('{{ pick.id }}', 'place')">
            Place
        </button>

        <button 
            class="acca-status-btn {% if pick.status == 'lose' %}active{% endif %}" 
            onclick="updatePickStatus('{{ pick.id }}', 'lose')">
            Lose
        </button>

        <button 
            class="acca-status-btn {% if pick.status == 'nr' %}active{% endif %}" 
            onclick="updatePickStatus('{{ pick.id }}', 'nr')">
            NR
        </button>
    </div>

</div>
