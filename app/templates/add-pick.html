{% extends "base.html" %}
{% block content %}

<div class="page-header">
    <h1 class="page-title">Enter Your Pick</h1>
</div>

<div class="add-pick-container">

    <form id="add-pick-form" class="add-pick-form">

        <!-- PLAYER -->
        <label class="form-label">Player</label>
        <select id="player" class="form-input">
            <option value="">Select Player</option>
        </select>

        <!-- COURSE -->
        <label class="form-label">Course</label>
        <input 
            id="course" 
            type="text" 
            class="form-input" 
            placeholder="Enter course name..."
        />

        <!-- HORSE NUMBER + NAME -->
        <label class="form-label">Horse Name & No.</label>
        <div class="horse-row">
            <input 
                id="horse_number" 
                type="text" 
                class="form-input horse-number" 
                placeholder="No."
            />
            <input 
                id="horse_name" 
                type="text" 
                class="form-input horse-name" 
                placeholder="Enter horse name..."
            />
        </div>

        <!-- RACE TIME -->
        <label class="form-label">Race Time</label>
        <input 
            id="race_time" 
            type="time" 
            class="form-input"
        />

        <!-- ODDS -->
        <label class="form-label">Odds</label>
        <input 
            id="odds_fraction" 
            type="text" 
            class="form-input" 
            placeholder="e.g. 5/1 or 6.0"
        />

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="submit-btn">
            Lock In Pick
        </button>

    </form>

</div>

<script src="/static/app.js"></script>
<script>
    loadPlayersForAddPick();
    setupAddPickForm();
</script>

{% endblock %}
