{% extends "base.html" %}
{% block content %}

<h1 class="page-title">Add New Pick</h1>

<div class="form-tile">

    <form method="post" action="/picks/add">

        <div class="form-row">
            <label>Player</label>
            <select name="player" required>
                {% for p in players %}
                    <option value="{{ p.name }}">{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <label>Horse Name</label>
            <input type="text" name="horse_name" required>
        </div>

        <div class="form-row">
            <label>Odds (Fractional)</label>
            <input type="text" name="odds_fraction" placeholder="e.g. 5/1" required>
        </div>

        <div class="form-row">
            <label>Status</label>
            <select name="status" required>
                <option value="Win">Win</option>
                <option value="Place">Place</option>
                <option value="Lose">Lose</option>
                <option value="NR">NR</option>
            </select>
        </div>

        <button class="submit-btn" type="submit">Submit Pick</button>

    </form>

</div>

{% endblock %}
