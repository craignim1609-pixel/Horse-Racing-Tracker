{% extends "base.html" %}

{% block content %}

<h1>Accumulator</h1>

<!-- ACCA HERO BOX -->
<div class="acca-hero">

    <div class="acca-hero-section">
        <label>Shared Acca Odds</label>
        <div id="accaOdds" class="acca-hero-value">0.00/1</div>
    </div>

    <div class="acca-hero-section">
        <label>£2.50 E/W Returns</label>
        <div id="accaReturns" class="acca-hero-value">£0.00</div>
    </div>

    <div class="acca-hero-status acca-status-empty" id="accaStatus">
        No Picks
    </div>

</div>

<!-- PAGE LAYOUT -->
<div class="acca-layout">

    <!-- LEFT: CURRENT PICKS -->
    <div class="acca-left">
        <h2>Current Picks</h2>
        <div id="accaPicks" class="acca-picks-grid"></div>
    </div>

    <!-- RIGHT: GROUP STANDINGS -->
    <div class="acca-right">
        <h2>Group Standings</h2>
        <div id="accaStandings" class="acca-standings-list"></div>
    </div>

</div>

<script src="/static/app_v10001.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    loadAccaHero();
    loadAccaPicks();
    loadAccaStandings();
});
</script>

{% endblock %}
