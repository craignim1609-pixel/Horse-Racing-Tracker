{% extends "base.html" %}
{% block content %}

<div class="acca-header">

    <div class="acca-header-left">
        <h1 class="page-title">Premium Shared Accumulator Tracker</h1>
    </div>

    <div class="acca-header-right">

        <div class="header-stat">
            <div class="stat-label">SHARED ACCA ODDS</div>
            <div id="acca-odds" class="stat-value">-</div>
        </div>

        <div class="header-stat">
            <div class="stat-label">£2.50 E/W RETURNS</div>
            <div id="acca-ew-return" class="stat-value">-</div>
        </div>

        <button id="acca-status" class="acca-status-btn">No Picks</button>

    </div>
</div>


<!-- MAIN TWO-COLUMN LAYOUT -->
<div class="acca-main">

    <!-- LEFT COLUMN: CURRENT PICKS -->
    <div class="acca-column acca-left">
        <h2 class="section-title">Current Picks</h2>

        <div id="acca-current-picks" class="acca-box">
            <div class="empty-message">No picks entered yet. Start by adding one.</div>
        </div>
    </div>

    <!-- RIGHT COLUMN: GROUP STANDINGS -->
    <div class="acca-column acca-right">
        <h2 class="section-title">Group Standings</h2>

        <div id="acca-standings" class="acca-box">
            <!-- JS will populate standings -->
        </div>
    </div>

</div>


<script src="/static/app_v10001.js"></script>
<script>
    loadAccumulator();
</script>

{% endblock %}
