{% extends "base.html" %}

{% block content %}

<h1>
    Accumulator 
    <span class="ew-badge">E/W</span>
</h1>

<h2>Completed Accas</h2>
<div id="accaHistory"></div>

<!-- ACCA STILL ALIVE BANNER -->
<div id="accaAliveBanner" class="acca-alive-banner" style="display:none;">
    ACCA STILL ALIVE
</div>

<!-- ACCA HERO BOX -->
<div class="acca-hero">

    <div class="acca-hero-section">
        <label>Win / Place Acca Odds</label>
        <div id="accaOdds" class="acca-hero-value">0.00/1</div>
    </div>

    <div class="acca-hero-section">
        <label>£2.50 E/W Returns</label>
        <div id="accaReturns" class="acca-hero-value">£0.00</div>
    </div>

    <div class="acca-hero-status acca-status-empty" id="accaStatus">
        No Picks
    </div>
</div>


<!-- RESET BUTTON -->
<button id="resetAccaBtn" class="reset-acca-btn">Reset Acca</button>

<!-- COMPLETE ACCA BUTTON -->
<button id="completeAccaBtn" class="complete-acca-btn">Complete Acca</button>

<!-- PAGE LAYOUT -->
<div class="acca-layout">

    <!-- LEFT: CURRENT PICKS -->
    <div class="acca-left">
        <h2>Current Picks</h2>
        <div id="accaPicks" class="acca-picks-grid"></div>
    </div>

    <!-- RIGHT: GROUP STANDINGS -->
    <div class="acca-right">
        <h2>Group Standings</h2>
        <div id="accaStandings" class="acca-standings-list"></div>
    </div>

</div>


<script src="/static/app_v10001.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    loadAccaHero();
    loadAccaPicks();
    loadAccaStandings();
    loadAccaHistorySmart();
});
</script>

{% endblock %}
