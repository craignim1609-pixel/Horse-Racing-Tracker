{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Accumulator</h2>

    <!-- ACCA SUMMARY -->
    <div class="card mb-4">
        <div class="card-body">

            <h4 class="mb-3">Accumulator Summary</h4>

            <div class="row text-center">
                <div class="col-md-4">
                    <h6>Status</h6>
                    <div id="acca-status" class="fw-bold">-</div>
                </div>

                <div class="col-md-4">
                    <h6>Combined Odds</h6>
                    <div id="acca-odds" class="fw-bold">-</div>
                </div>

                <div class="col-md-4">
                    <h6>E/W Return (£2.50)</h6>
                    <div id="acca-ew-return" class="fw-bold">-</div>
                </div>
            </div>

        </div>
    </div>


    <!-- ACCA PICKS TABLE -->
    <div class="card">
        <div class="card-body">

            <h4 class="mb-3">Accumulator Picks</h4>

            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Course</th>
                        <th>Horse</th>
                        <th>Odds</th>
                        <th>Status</th>
                        <th>Remove</th>
                    </tr>
                </thead>

                <tbody id="acca-picks-body">
                    <!-- JS will populate -->
                </tbody>
            </table>

        </div>
    </div>

</div>

<script src="/static/js/acca.js"></script>

{% endblock %}
